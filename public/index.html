<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cookity</title>
</head>
<body>
    <header>
        <div class="site-logo">
            <img src="images/Cookity-logo.png" alt="site-logo" style="height: 70%; width: 20%;">
            <p>Cookity</p>
        </div>
        <nav>
            <a href="">about me</a>
            <img src="" alt="">
        </nav>
    </header>
    <main>
        <article>
            <h1>Use Cookity to make your own recipies!</h1>
            <h2>Sign in for free to start</h2>
        </article>
        <div class="container">
            <a class="navy-button" href="/login">Login</a>
        </div>
    </main>
    <footer>
        <p>Site was created by: Piotr Barabanow 3c</p>
    </footer>

    <div id="cookie-popup">
        Ta strona używa plików cookie 🍪
        <button onclick="acceptCookies()">Akceptuję</button>
        <button onclick="rejectCookies()">Odrzuć</button>
        <a href="/privacy-policy">Polityka prywatności</a>
    </div>

    <script>
        function acceptCookies() {
            localStorage.setItem("cookiesAccepted", "true");
            document.getElementById("cookie-popup").style.display = "none";
        }

        function rejectCookies() {
            localStorage.setItem("cookiesAccepted", "false");
            document.getElementById("cookie-popup").style.display = "none";
        }

        window.onload = function() {
            if (!localStorage.getItem("cookiesAccepted")) {
            document.getElementById("cookie-popup").style.display = "block";
            }
        }
    </script>
</body>
</html>
